services:
  dev-env:
    build:
      context: .
      dockerfile: ./dev/Dockerfile
      args:
        - USER_NAME=${USER_NAME:-}
        - USER_NAME_CN=${USER_NAME_CN:-}
        - USER_EMAIL=${USER_EMAIL:-}
        - HTTP_PROXY=${HTTP_PROXY:-}
        - HTTPS_PROXY=${HTTPS_PROXY:-}
    image: dev-env:latest
    container_name: dev-env-ukyang
    hostname: dev-env
    restart: unless-stopped
    tty: true
    stdin_open: true
    volumes:
      # 挂dotfile目录
      # - ${DOTFILE_DIR:-/root/dotfile}:/home/ukyang/dotfile
      # 挂载 SSH 密钥（从宿主机，只读）
      # - ${HOME}/.ssh:/home/ukyang/.ssh:ro
      # 挂载 Git 配置
      # - ${HOME}/.gitconfig:/home/ukyang/.gitconfig:ro
      # 挂载自定义配置文件
      # - ${CONFIG_DIR:-./config}:/home/ukyang/.config
      # 持久化 Go 缓存
      - go-cache:/go/pkg
      # 持久化 Zsh 历史
      # - zsh-history:/home/ukyang/.zsh_history
    environment:
      - TZ=Asia/Shanghai
      - LANG=C.UTF-8
      - TERM=xterm-256color
      # 网络代理（如果需要在运行时使用）
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - NO_PROXY=localhost,127.0.0.1
    networks:
      - dev-network
      # ports:
      # 如果开发需要暴露端口，可以在这里添加
      # - "8080:8080"
      # - "3000:3000"
      # 健康检查
    healthcheck:
      test: ["CMD", "test", "-f", "/usr/local/nvim/bin/nvim"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: tail -f /dev/null
    # 资源限制，WSL暂不支持
    #deploy:
    #  resources:
    #    limits:
    #      cpus: '2'
    #      memory: 4G
    #    reservations:
    #      cpus: '0.5'
    #      memory: 1G

    # 2. Portainer 容器
  portainer:
    image: portainer/portainer-ce:2.39.1
    container_name: portainer
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - dev-network
    # 健康检查
    #healthcheck:
    #  test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9000/api/system/status || exit 1"]
    #  interval: 30s
    #  timeout: 10s
    #  retries: 3
    #  start_period: 40s
    # 资源限制，WSL暂不支持
    #deploy:
    #  resources:
    #    limits:
    #      cpus: '1'
    #      memory: 1G
    #    reservations:
    #      cpus: '0.2'
    #      memory: 256M

networks:
  dev-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1

volumes:
  portainer_data:
    driver: local
  go-cache:
    driver: local
  #zsh-history:
  #  driver: local
